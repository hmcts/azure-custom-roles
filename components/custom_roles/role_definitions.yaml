- name: Orphan Resource Cleanup Read/Delete
  description: Read and Resource Delete Access to applicably assigned scope
  scope: "/providers/Microsoft.Management/managementGroups/HMCTS"
  assignableScopes: [
    "/providers/Microsoft.Management/managementGroups/HMCTS"
  ]
  permissions:
    actions:
      - "*/read"
      - "Microsoft.Resources/*/delete"
      - "Microsoft.Compute/disks/delete"
    not_actions: []
    data_actions: []
    not_data_actions: []
- name: Azure Policy Resource Group and Security Automation
  description: Allow Azure Policy MI to create resources
  scope: "/providers/Microsoft.Management/managementGroups/HMCTS"
  assignableScopes: [
    "/providers/Microsoft.Management/managementGroups/HMCTS"
  ]
  permissions:
    actions:
      - "Microsoft.Resources/subscriptions/resourceGroups/write"
      - "Microsoft.Resources/subscriptions/resourceGroups/read"
      - "Microsoft.Security/automations/write"
      - "Microsoft.Security/automations/read"
    not_actions: []
    data_actions: []
    not_data_actions: []
- name: Azure Storage Account Blob Tagging
  description: Allow reading and writing tags on blobs in storage accounts
  scope: "/providers/Microsoft.Management/managementGroups/HMCTS"
  assignableScopes: [
    "/providers/Microsoft.Management/managementGroups/HMCTS"
  ]
  permissions:
    actions: []
    not_actions: []
    data_actions:
      - "Microsoft.Storage/storageAccounts/blobServices/containers/blobs/tags/write"
      - "Microsoft.Storage/storageAccounts/blobServices/containers/blobs/tags/read"
    not_data_actions: []
- name: Azure Contributor Role minus deletes
  description: Allow all standard contributor access minus any delete actions
  scope: "/providers/Microsoft.Management/managementGroups/HMCTS"
  assignableScopes: [
    "/providers/Microsoft.Management/managementGroups/HMCTS"
  ]
  permissions:
    actions:
      - "*"
    not_actions:
      - "*/delete"
    data_actions: []
    not_data_actions: []
- name: PIM Azure Contributor
  description: A role that users can activate via PIM to provide contributor access
  scope: "/providers/Microsoft.Management/managementGroups/HMCTS"
  assignableScopes: [
    "/providers/Microsoft.Management/managementGroups/HMCTS"
  ]
  permissions:
    actions:
      - "*"
    not_actions:
      - "Microsoft.Authorization/*/Delete"
      - "Microsoft.Authorization/*/Write"
      - "Microsoft.Authorization/elevateAccess/Action"
      - "Microsoft.Blueprint/blueprintAssignments/write"
      - "Microsoft.Blueprint/blueprintAssignments/delete"
      - "Microsoft.Compute/galleries/share/action"
    data_actions:
      - "*"
    not_data_actions: []
- name: Backup Vault Restore Operator - PostgreSQL
  description: >
    Grants permissions required to provision a PostgreSQL Flexible Server with
    private networking during a backup vault restore. Covers server read/create,
    subnet join, and private DNS zone association. Storage and vault operations
    are covered separately by built-in role assignments (Contributor /
    Storage Blob Data Reader / Backup Contributor).
  scope: "/providers/Microsoft.Management/managementGroups/HMCTS"
  assignableScopes:
    # Subscriptions hosting PostgreSQL Flexible Servers
    - "/subscriptions/5ca62022-6aa2-4cee-aaa7-e7536c8d566c" # DTS-SHAREDSERVICES-PROD
    - "/subscriptions/8999dec3-0104-4a27-94ee-6588559729d1" # DCD-CNP-Prod
    - "/subscriptions/8cbc6f36-7c56-4963-9d36-739db5d00b27" # DCD-CFTAPPS-PROD
    - "/subscriptions/17390ec1-5a5e-4a20-afb3-38d8d726ae45" # DTS-HERITAGE-INTSVC-PROD
    - "/subscriptions/bf308a5c-0624-4334-8ff8-8dca9fd43783" # DCD-CFT-Sandbox
    - "/subscriptions/a8140a9e-f1b0-481f-a4de-09e2ee23f7ab" # DTS-SHAREDSERVICES-SBOX
    # Virtual networks containing delegated subnets for PostgreSQL
    - "/subscriptions/5ca62022-6aa2-4cee-aaa7-e7536c8d566c/resourceGroups/ss-prod-network-rg/providers/Microsoft.Network/virtualNetworks/ss-prod-vnet"
    - "/subscriptions/a8140a9e-f1b0-481f-a4de-09e2ee23f7ab/resourceGroups/ss-sbox-network-rg/providers/Microsoft.Network/virtualNetworks/ss-sbox-vnet"
    - "/subscriptions/8cbc6f36-7c56-4963-9d36-739db5d00b27/resourceGroups/cft-prod-network-rg/providers/Microsoft.Network/virtualNetworks/cft-prod-vnet"
    - "/subscriptions/b72ab7b7-723f-4b18-b6f6-03b0f2c6a1bb/resourceGroups/cft-sbox-network-rg/providers/Microsoft.Network/virtualNetworks/cft-sbox-vnet"
    # Private DNS zones for PostgreSQL Flexible Server
    - "/subscriptions/1baf5470-1c3e-40d3-a6f7-74bfbce4b348/resourceGroups/core-infra-intsvc-rg/providers/Microsoft.Network/privateDnsZones/private.postgres.database.azure.com"
  permissions:
    actions:
      - "Microsoft.DBforPostgreSQL/flexibleServers/read"
      - "Microsoft.DBforPostgreSQL/flexibleServers/write"
      - "Microsoft.Network/virtualNetworks/subnets/join/action"
      - "Microsoft.Network/virtualNetworks/subnets/read"
      - "Microsoft.Network/privateDnsZones/read"
      - "Microsoft.Network/privateDnsZones/join/action"
      - "Microsoft.Network/privateDnsZones/virtualNetworkLinks/read"
    not_actions: []
    data_actions: []
    not_data_actions: []
